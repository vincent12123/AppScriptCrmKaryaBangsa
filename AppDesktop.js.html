<script>
var DESKTOP_TOKEN = '';
var DESKTOP_CFG = {};
var DESKTOP_ALL_CALON = [];
var DESKTOP_FILTERED_CALON = [];
var DESKTOP_REMINDER_DATA = [];
var DESKTOP_TEMPLATE_DATA = [];
var DESKTOP_TEMPLATE_CALON_DATA = [];
var DESKTOP_FU_SEARCH_RESULTS = [];
var DESKTOP_SELECTED_CALON = null;
var DESKTOP_FORM_MODE = 'create';

function desktopTok() { return DESKTOP_TOKEN; }
function desktopSaveToken(t) { DESKTOP_TOKEN = t || ''; try { sessionStorage.setItem('crm_token', DESKTOP_TOKEN); } catch(e) {} }
function desktopClearToken() { DESKTOP_TOKEN = ''; try { sessionStorage.removeItem('crm_token'); } catch(e) {} }
function desktopLoadTokenFromStorage() { try { return sessionStorage.getItem('crm_token') || ''; } catch(e) { return ''; } }

function desktopShowToast(msg, duration) {
  duration = duration || 2500;
  var t = document.getElementById('desktopToast');
  t.textContent = msg;
  t.classList.remove('hidden');
  clearTimeout(t._timer);
  t._timer = setTimeout(function() { t.classList.add('hidden'); }, duration);
}

function desktopShowLogin() {
  document.getElementById('desktopLoginScreen').classList.remove('hidden');
  document.getElementById('desktopApp').classList.add('hidden');
}
function desktopShowApp() {
  document.getElementById('desktopLoginScreen').classList.add('hidden');
  document.getElementById('desktopApp').classList.remove('hidden');
}

function desktopUnwrapResponse(res) {
  if (!res || typeof res !== 'object' || !Object.prototype.hasOwnProperty.call(res, 'ok')) return res;
  if (!res.ok) {
    if (res.message && res.message.indexOf('login ulang') !== -1) {
      desktopClearToken();
      desktopShowLogin();
      desktopShowToast('⚠️ Sesi habis. Silakan login kembali.');
      throw new Error('SESSION_EXPIRED');
    }
    throw new Error(res.message || 'Server error');
  }
  return res.data;
}

function desktopSubmitLogin() {
  var email = (document.getElementById('desktopLoginEmail').value || '').trim();
  var pin = (document.getElementById('desktopLoginPin').value || '').trim();
  var errEl = document.getElementById('desktopLoginError');
  var btn = document.getElementById('desktopLoginBtn');
  errEl.classList.add('hidden');
  if (!email || !pin) {
    errEl.textContent = 'Email dan PIN wajib diisi.';
    errEl.classList.remove('hidden');
    return;
  }
  btn.disabled = true;
  btn.textContent = 'Memverifikasi...';
  google.script.run.withSuccessHandler(function(res) {
    btn.disabled = false;
    btn.textContent = 'Masuk';
    if (!res || !res.ok) {
      errEl.textContent = (res && res.message) || 'Login gagal.';
      errEl.classList.remove('hidden');
      return;
    }
    desktopSaveToken(res.data.token);
    desktopInitApp();
  }).withFailureHandler(function(err) {
    btn.disabled = false;
    btn.textContent = 'Masuk';
    errEl.textContent = err.message || 'Terjadi kesalahan saat login.';
    errEl.classList.remove('hidden');
  }).loginWithPin({ email: email, pin: pin });
}

function desktopLogout() {
  var oldToken = DESKTOP_TOKEN;
  desktopClearToken();
  try { google.script.run.logoutSession(oldToken); } catch(e) {}
  desktopShowLogin();
}

function desktopInitApp() {
  google.script.run.withSuccessHandler(function(res) {
    if (!res || !res.ok) {
      desktopClearToken();
      desktopShowLogin();
      return;
    }
    DESKTOP_CFG = res.data;
    desktopShowApp();
    desktopApplyUser(res.data.user);
    desktopPopulateDropdowns(res.data);
    desktopBindNav();
    desktopSwitchPage('dashboard');
    desktopLoadDashboard();
    desktopLoadCalon();
    desktopLoadTemplates();
  }).withFailureHandler(function() {
    desktopClearToken();
    desktopShowLogin();
  }).getConfig(desktopTok());
}

function desktopApplyUser(user) {
  document.getElementById('desktopUserName').textContent = user.name || '-';
  document.getElementById('desktopUserMeta').textContent = (user.role || 'VIEWER') + ' · ' + (user.email || '-');
}

function desktopBindNav() {
  document.querySelectorAll('.desktop-nav-item').forEach(function(el) {
    el.onclick = function() { desktopSwitchPage(el.dataset.page); };
  });
}

function desktopSwitchPage(page) {
  document.querySelectorAll('.desktop-page').forEach(function(el) { el.classList.add('hidden'); });
  document.getElementById('desktop-page-' + page).classList.remove('hidden');
  document.querySelectorAll('.desktop-nav-item').forEach(function(el) {
    var active = el.dataset.page === page;
    el.classList.toggle('bg-brand-50', active);
    el.classList.toggle('text-brand-700', active);
    el.classList.toggle('text-slate-700', !active);
  });
  var titles = { dashboard: 'Dashboard', calon: 'Data Calon', followup: 'Follow-up', template: 'Template WA' };
  document.getElementById('desktopPageTitle').textContent = titles[page] || 'CRM SPMB';
  desktopUpdateTopbarActions(page);
  if (page === 'template') desktopRenderTemplateList();
  if (page === 'followup') desktopRenderFollowupList([]);
}

function desktopUpdateTopbarActions(page) {
  var el = document.getElementById('desktopTopbarActions');
  if (page === 'dashboard') {
    var html = '<button class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700" onclick="desktopLoadDashboard()">Refresh</button>';
    if (DESKTOP_CFG.permissions && DESKTOP_CFG.permissions.canSendReminder) html += '<button class="rounded-2xl bg-amber-500 px-4 py-2.5 text-sm font-semibold text-white" onclick="desktopSendReminderNow()">Kirim Reminder</button>';
    el.innerHTML = html;
  } else if (page === 'calon') {
    var parts = [];
    if (DESKTOP_CFG.permissions && DESKTOP_CFG.permissions.canImport) {
      parts.push('<button class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700" onclick="desktopOpenImportModal()">Import CSV</button>');
    }
    if (DESKTOP_CFG.permissions && DESKTOP_CFG.permissions.canWrite) {
      parts.push('<button class="rounded-2xl bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white" onclick="desktopOpenCreateCalon()">+ Tambah Calon</button>');
    }
    el.innerHTML = parts.join('') || '<span class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-500">Read only</span>';
  } else if (page === 'template') {
    el.innerHTML = '<button class="rounded-2xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700" onclick="desktopLoadTemplates()">Refresh Template</button>';
  } else {
    el.innerHTML = '';
  }
}

function desktopApplyPermissionAwareUi() {
  var lifecycle = document.getElementById('desktopFilterLifecycle');
  if (lifecycle && !(DESKTOP_CFG.permissions && DESKTOP_CFG.permissions.canViewArchived)) {
    lifecycle.value = 'active';
    Array.prototype.slice.call(lifecycle.options).forEach(function(opt) {
      if (opt.value === 'archived' || opt.value === 'all') opt.remove();
    });
  }

  var addBtn = document.getElementById('desktopInlineAddBtn');
  if (addBtn) addBtn.classList.toggle('hidden', !(DESKTOP_CFG.permissions && DESKTOP_CFG.permissions.canWrite));
}

function desktopFillSelect(id, items, keepFirst) {
  var sel = document.getElementById(id);
  if (!sel) return;
  var startIdx = keepFirst ? 1 : 0;
  while (sel.options.length > startIdx) sel.remove(startIdx);
  (items || []).forEach(function(v) { var o = document.createElement('option'); o.value = o.text = v; sel.add(o); });
}

function desktopGetScopedPicOptions(cfg) {
  var allPics = (cfg && cfg.pics) || [];
  var user = (cfg && cfg.user) || {};
  var role = String(user.role || '').toUpperCase();
  var scopedName = String((cfg && cfg.scope && cfg.scope.picName) || '').trim();
  var userName = String(user.name || '').trim();

  if (role === 'PIC') {
    if (scopedName) {
      return [scopedName];
    }

    var exact = allPics.find(function(p) {
      return String(p || '').trim().toLowerCase() === userName.toLowerCase();
    });

    if (exact) return [exact];
    return userName ? [userName] : [];
  }

  return allPics;
}

function desktopLockPicFieldIfNeeded(fieldId, cfg, preferredValue) {
  var el = document.getElementById(fieldId);
  if (!el) return;

  var user = (cfg && cfg.user) || {};
  var role = String(user.role || '').toUpperCase();
  var scopedPics = desktopGetScopedPicOptions(cfg);

  if (role === 'PIC') {
    var value = scopedPics[0] || preferredValue || '';
    desktopFillSelect(fieldId, scopedPics.length ? scopedPics : (value ? [value] : []));
    el.value = value;
    el.disabled = true;
    el.classList.add('bg-slate-100');
  } else {
    el.disabled = false;
    el.classList.remove('bg-slate-100');
    desktopFillSelect(fieldId, (cfg && cfg.pics) || []);
    if (preferredValue) el.value = preferredValue;
  }
}

function desktopPopulateDropdowns(cfg) {
  desktopFillSelect('desktopFilterStatus', cfg.statuses, true);
  desktopFillSelect('desktopFilterJurusan', cfg.jurusans, true);
  desktopFillSelect('desktopFilterPic', cfg.pics, true);
  desktopFillSelect('desktop_f_jurusan', cfg.jurusans);
  desktopFillSelect('desktop_f_sumber', cfg.sumbers);
  desktopFillSelect('desktop_f_prioritas', cfg.prioritas);
  desktopFillSelect('desktop_f_status', cfg.statuses);
  desktopFillSelect('desktop_fu_arah', cfg.arahs);
  desktopFillSelect('desktop_fu_status', cfg.statuses, true);

  var userRole = String((cfg.user && cfg.user.role) || '').toUpperCase();
  var userName = String((cfg.user && cfg.user.name) || '').trim();
  var scopedPics = desktopGetScopedPicOptions(cfg);

  if (userRole === 'PIC') {
    desktopFillSelect('desktop_f_pic', scopedPics);
    document.getElementById('desktop_f_pic').value = scopedPics[0] || '';
    document.getElementById('desktop_f_pic').disabled = true;
    document.getElementById('desktop_f_pic').classList.add('bg-slate-100');

    desktopFillSelect('desktop_fu_pic', scopedPics);
    document.getElementById('desktop_fu_pic').value = scopedPics[0] || '';
    document.getElementById('desktop_fu_pic').disabled = true;
    document.getElementById('desktop_fu_pic').classList.add('bg-slate-100');
  } else {
    desktopFillSelect('desktop_f_pic', cfg.pics);
    desktopFillSelect('desktop_fu_pic', cfg.pics);

    document.getElementById('desktop_f_pic').disabled = false;
    document.getElementById('desktop_fu_pic').disabled = false;
    document.getElementById('desktop_f_pic').classList.remove('bg-slate-100');
    document.getElementById('desktop_fu_pic').classList.remove('bg-slate-100');

    var picMatch = (cfg.pics || []).find(function(p) {
      return String(p || '').toLowerCase().includes(userName.toLowerCase());
    });

    if (picMatch) {
      document.getElementById('desktop_f_pic').value = picMatch;
      document.getElementById('desktop_fu_pic').value = picMatch;
    }
  }

  desktopApplyPermissionAwareUi();
}

function desktopStatusClass(status) {
  var map = {'Baru':'bg-blue-100 text-blue-700','Dihubungi':'bg-amber-100 text-amber-700','Tertarik':'bg-emerald-100 text-emerald-700','Proses Daftar':'bg-purple-100 text-purple-700','Sudah Daftar':'bg-cyan-100 text-cyan-700','Tidak Jadi':'bg-rose-100 text-rose-700'};
  return map[status] || 'bg-slate-100 text-slate-700';
}
function desktopPriorityClass(priority) {
  var map = {'Tinggi':'bg-rose-100 text-rose-700','Sedang':'bg-amber-100 text-amber-700','Rendah':'bg-emerald-100 text-emerald-700'};
  return map[priority] || 'bg-slate-100 text-slate-700';
}
function desktopDirectionClass(direction) { return direction === 'Inbound' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'; }
function desktopBadge(text, cls) { return '<span class="inline-flex items-center rounded-full px-2.5 py-1 text-[11px] font-semibold ' + cls + '">' + text + '</span>'; }
function desktopMiniBar(label, value, pct, colorClass) {
  return '<div class="space-y-1.5"><div class="flex items-center justify-between text-sm"><span class="font-medium text-slate-600">' + label + '</span><span class="font-semibold text-slate-900">' + value + ' (' + pct + '%)</span></div><div class="h-2.5 overflow-hidden rounded-full bg-slate-100"><div class="h-full rounded-full ' + colorClass + '" style="width:' + Math.max(4, pct || 0) + '%"></div></div></div>';
}

function desktopStatCard(label, value, sub) {
  return '<div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft"><div class="text-sm font-semibold text-slate-600">' + label + '</div><div class="mt-3 text-3xl font-bold text-slate-900">' + value + '</div><div class="mt-1 text-xs text-slate-500">' + sub + '</div></div>';
}

function desktopActionBtn(text, cls, onclick) {
  return '<button class="rounded-2xl px-3 py-2 text-xs font-semibold ' + cls + '" onclick="' + onclick + '">' + text + '</button>';
}

function desktopLoadDashboard() {
  google.script.run.withSuccessHandler(function(res) {
    try { desktopRenderDashboard(desktopUnwrapResponse(res)); }
    catch(e) { if (e.message !== 'SESSION_EXPIRED') desktopShowToast('❌ ' + e.message); }
  }).withFailureHandler(function(err) { desktopShowToast('❌ ' + err.message); }).getDashboardStats(desktopTok());
}

function desktopRenderDashboard(stats) {
  var total = stats.total || 0, sudahDaftar = stats.sudahDaftar || 0, tidakJadi = stats.tidakJadi || 0, aktif = total - sudahDaftar - tidakJadi, overdue = (stats.overdueCalon || []).length, konversi = total ? Math.round((sudahDaftar / total) * 100) : 0;
  document.getElementById('desktopStatGrid').innerHTML = [desktopStatCard('Total Calon', total, 'Terdaftar di sistem'), desktopStatCard('Sudah Daftar', sudahDaftar, konversi + '% konversi'), desktopStatCard('Aktif Diproses', aktif, 'Masih dalam pipeline'), desktopStatCard('Belum Follow-up', stats.belumPernahFollowup || 0, 'Perlu sentuhan pertama'), desktopStatCard('Calon Baru 7 Hari', stats.calonBaru7Hari || 0, 'Lead terbaru'), desktopStatCard('Arsip', stats.archived || 0, 'Calon diarsipkan'), desktopStatCard('Overdue', overdue, 'Perlu ditindak')].join('');
  var totalSafe = total || 1;
  var colors = {'Baru':'bg-blue-500','Dihubungi':'bg-amber-500','Tertarik':'bg-emerald-500','Proses Daftar':'bg-purple-500','Sudah Daftar':'bg-cyan-500','Tidak Jadi':'bg-rose-500'};
  document.getElementById('desktopPipelineChart').innerHTML = Object.keys(stats.byStatus || {}).map(function(s){ var n=stats.byStatus[s]; return desktopMiniBar(s,n,Math.round((n/totalSafe)*100), colors[s] || 'bg-slate-400');}).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
  document.getElementById('desktopJurusanChart').innerHTML = Object.keys(stats.byJurusan || {}).map(function(j){ var n=stats.byJurusan[j]; return desktopMiniBar(j,n,Math.round((n/totalSafe)*100), 'bg-brand-600');}).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
  document.getElementById('desktopConversionChart').innerHTML = (stats.conversionByPic || []).map(function(row){ return '<div class="rounded-2xl bg-slate-50 p-3"><div class="flex items-center justify-between text-sm"><span class="font-medium text-slate-700">'+row.pic+'</span><span class="rounded-full bg-white px-2.5 py-1 text-xs font-semibold text-slate-700">'+row.sudahDaftar+'/'+row.total+' daftar</span></div><div class="mt-2">'+desktopMiniBar('Konversi', row.konversi, row.konversi, 'bg-emerald-500')+'</div></div>';}).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
  document.getElementById('desktopPicChart').innerHTML = Object.keys(stats.byPic || {}).map(function(p){ return '<div class="flex items-center justify-between rounded-2xl bg-slate-50 px-4 py-3 text-sm"><span class="font-medium text-slate-700">'+p+'</span><span class="rounded-full bg-slate-900 px-2.5 py-1 text-xs font-semibold text-white">'+stats.byPic[p]+'</span></div>'; }).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
  document.getElementById('desktopSourceChart').innerHTML = Object.keys(stats.bySumber || {}).map(function(s){ var n=stats.bySumber[s]; return desktopMiniBar(s,n,Math.round((n/totalSafe)*100), 'bg-sky-500');}).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
  document.getElementById('desktopTrendChart').innerHTML = (stats.monthlyTrend || []).map(function(row){ var max=0; (stats.monthlyTrend || []).forEach(function(x){ if (x.total > max) max = x.total; }); return desktopMiniBar(row.label, row.total, max ? Math.round((row.total / max) * 100) : 0, 'bg-fuchsia-500'); }).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
  DESKTOP_REMINDER_DATA = stats.reminderHariIni || [];
  var chip = document.getElementById('desktopReminderCountChip');
  if (DESKTOP_REMINDER_DATA.length) { chip.textContent = DESKTOP_REMINDER_DATA.length + ' item'; chip.classList.remove('hidden'); } else chip.classList.add('hidden');
  document.getElementById('desktopReminderList').innerHTML = DESKTOP_REMINDER_DATA.length ? DESKTOP_REMINDER_DATA.map(function(c){ return '<div class="rounded-2xl border border-slate-200 bg-slate-50 p-3"><div class="font-semibold text-slate-900">'+c.nama+'</div><div class="mt-1 text-xs text-slate-500">'+c.jurusan+' · '+(c.pic||'-')+'</div><div class="mt-2 text-xs text-slate-600">FU: '+(c.jadwalFollowup||'-')+'</div></div>';}).join('') : '<div class="rounded-2xl bg-emerald-50 p-3 text-sm text-emerald-700">Tidak ada jadwal follow-up hari ini.</div>';
  var overdueData = stats.overdueCalon || [];
  document.getElementById('desktopOverdueCountChip').textContent = overdueData.length + ' item';
  document.getElementById('desktopOverdueList').innerHTML = overdueData.length ? overdueData.map(function(c){ return '<div class="rounded-2xl border border-red-200 bg-red-50 p-3"><div class="font-semibold text-slate-900">'+c.nama+'</div><div class="mt-1 text-xs text-slate-500">'+c.asalSekolah+' · '+c.jurusan+'</div><div class="mt-2 text-xs font-semibold text-red-700">Jadwal: '+(c.jadwalFollowup||'-')+'</div></div>';}).join('') : '<div class="rounded-2xl bg-emerald-50 p-3 text-sm text-emerald-700">Tidak ada calon overdue.</div>';
}

function desktopCurrentLifecycle() { var el = document.getElementById('desktopFilterLifecycle'); return el ? el.value : 'active'; }
function desktopCurrentFollowupState() { var el = document.getElementById('desktopFilterFollowupState'); return el ? el.value : ''; }
function desktopWaLink(noWa) { window.open('https://wa.me/62' + String(noWa || '').replace(/^0/, ''), '_blank'); }
function desktopLoadCalon() {
  google.script.run.withSuccessHandler(function(response) {
    try {
      DESKTOP_ALL_CALON = desktopUnwrapResponse(response);
      desktopRenderCalonTable(DESKTOP_ALL_CALON);
      DESKTOP_TEMPLATE_CALON_DATA = DESKTOP_ALL_CALON.filter(function(r){ return !r.isDeleted; });
      desktopPopulateTemplateCalonOptions();
    } catch(e) { if (e.message !== 'SESSION_EXPIRED') desktopShowToast('❌ ' + e.message); }
  }).withFailureHandler(function(e){ desktopShowToast('❌ ' + e.message); }).getDataCalon({ lifecycle: desktopCurrentLifecycle(), overdueOnly: desktopCurrentFollowupState() === 'overdue' }, desktopTok());
}
function desktopFilterCalon() {
  var search = (document.getElementById('desktopSearchCalon').value || '').toLowerCase();
  var status = document.getElementById('desktopFilterStatus').value;
  var jurusan = document.getElementById('desktopFilterJurusan').value;
  var pic = document.getElementById('desktopFilterPic').value;
  var data = DESKTOP_ALL_CALON.filter(function(r){
    if (search && !r.nama.toLowerCase().includes(search) && !r.noWa.includes(search) && !r.asalSekolah.toLowerCase().includes(search)) return false;
    if (status && r.status !== status) return false;
    if (jurusan && r.jurusan !== jurusan) return false;
    if (pic && r.pic !== pic) return false;
    return true;
  });
  desktopRenderCalonTable(data);
}
function desktopRenderCalonTable(data) {
  DESKTOP_FILTERED_CALON = data;
  document.getElementById('desktopCalonCount').textContent = 'Menampilkan ' + data.length + ' data';
  var tbody = document.getElementById('desktopCalonTableBody');
  if (!data.length) { tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-6 text-center text-slate-500">Tidak ada data</td></tr>'; return; }
  tbody.innerHTML = data.map(function(r,i){
    var actions = r.actions || {};
    var btns = '<div class="flex flex-wrap gap-2">';
    if (r.isDeleted) {
      if (actions.canRestore) btns += '<button class="rounded-xl bg-sky-600 px-3 py-2 text-xs font-semibold text-white" onclick="desktopRestoreArchivedCalon('+i+')">Restore</button>';
      btns += '<button class="rounded-xl border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-700" onclick="desktopOpenDetailFromRow('+i+')">Detail</button>';
    } else {
      btns += '<button class="rounded-xl bg-emerald-600 px-3 py-2 text-xs font-semibold text-white" onclick="desktopWaLink(\''+r.noWa+'\')">WA</button>';
      btns += '<button class="rounded-xl border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-700" onclick="desktopOpenDetailFromRow('+i+')">Detail</button>';
      if (actions.canEdit) btns += '<button class="rounded-xl bg-brand-600 px-3 py-2 text-xs font-semibold text-white" onclick="desktopOpenEditFromRow('+i+')">Edit</button>';
      if (actions.canReschedule) btns += '<button class="rounded-xl bg-amber-500 px-3 py-2 text-xs font-semibold text-white" onclick="desktopPromptRescheduleCalon('+i+')">Jadwal</button>';
      if (actions.canLogFollowup) btns += '<button class="rounded-xl bg-indigo-600 px-3 py-2 text-xs font-semibold text-white" onclick="desktopSwitchToFollowupFromRow('+i+')">Log</button>';
      if (actions.canArchive) btns += '<button class="rounded-xl bg-rose-600 px-3 py-2 text-xs font-semibold text-white" onclick="desktopConfirmDeleteCalon('+i+')">Arsip</button>';
    }
    btns += '</div>';
    return '<tr class="border-t border-slate-100 hover:bg-slate-50'+(r.isDeleted ? ' bg-slate-50' : '')+'"><td class="px-6 py-4"><div class="font-semibold text-slate-900">'+r.nama+'</div><div class="mt-1 text-xs text-slate-500">'+r.noWa+'</div></td><td class="px-6 py-4 text-slate-600">'+r.asalSekolah+'</td><td class="px-6 py-4 text-slate-600">'+r.jurusan+'</td><td class="px-6 py-4"><div class="flex flex-wrap gap-2"><span class="inline-flex rounded-full px-2.5 py-1 text-xs font-semibold '+desktopStatusClass(r.status)+'">'+(r.status||'-')+'</span>'+(r.isDeleted ? '<span class="inline-flex rounded-full bg-slate-200 px-2.5 py-1 text-xs font-semibold text-slate-700">Arsip</span>' : '')+'</div></td><td class="px-6 py-4 text-slate-600">'+(r.pic||'-')+'</td><td class="px-6 py-4 text-slate-600">'+(r.jadwalFollowup||'-')+'</td><td class="px-6 py-4">'+btns+'</td></tr>';
  }).join('');
}

function desktopOpenCreateCalon() {
  if (!(DESKTOP_CFG.permissions && DESKTOP_CFG.permissions.canWrite)) { desktopShowToast('⚠️ Akun Anda read only.'); return; }
  DESKTOP_FORM_MODE = 'create';
  DESKTOP_SELECTED_CALON = null;
  document.getElementById('desktopEditTitle').textContent = 'Tambah Calon Baru';
  document.getElementById('desktopEditSubmitBtn').textContent = 'Simpan';
  ['desktop_f_id','desktop_f_nama','desktop_f_noWa','desktop_f_asalSekolah','desktop_f_catatan','desktop_f_jadwal'].forEach(function(id){ document.getElementById(id).value=''; });

}

function desktopSubmitImportCsv() {
  var csvText = (document.getElementById('desktopImportCsvText').value || '').trim();
  if (!csvText) { desktopShowToast('⚠️ Tempel isi CSV atau pilih file .csv terlebih dahulu.'); return; }
  var btn = document.getElementById('desktopImportCsvSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Mengimpor...';
  google.script.run.withSuccessHandler(function(res) {
    btn.disabled = false;
    btn.textContent = 'Import';
    try {
      var data = desktopUnwrapResponse(res);
      var box = document.getElementById('desktopImportResultBox');
      box.classList.remove('hidden');
      var lines = ['Imported: ' + (data.imported || 0), 'Skipped: ' + (data.skipped || 0)];
      if ((data.errors || []).length) {
        lines.push('Detail:');
        data.errors.slice(0, 20).forEach(function(err) { lines.push('- Baris ' + err.line + ' [' + err.type + ']: ' + err.message); });
        if (data.errors.length > 20) lines.push('- ...dan ' + (data.errors.length - 20) + ' item lainnya');
      }
      box.textContent = lines.join('\n');
      desktopLoadCalon();
      desktopLoadDashboard();
    } catch (e) {
      if (e.message !== 'SESSION_EXPIRED') desktopShowToast('❌ Import error: ' + e.message);
    }
  }).withFailureHandler(function(err) {
    btn.disabled = false;
    btn.textContent = 'Import';
    desktopShowToast('❌ Gagal import: ' + err.message);
  }).importCalonCsv(csvText, { skipDuplicates: true }, desktopTok());
}

window.onload = function() {
  DESKTOP_TOKEN = desktopLoadTokenFromStorage();
  if (!DESKTOP_TOKEN) { desktopShowLogin(); return; }
  desktopInitApp();
};
</script>

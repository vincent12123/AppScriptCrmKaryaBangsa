<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CRM SPMB Mobile</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          boxShadow: {
            soft: '0 4px 20px rgba(15, 23, 42, 0.08)',
          },
          colors: {
            brand: {
              50: '#eff6ff',
              100: '#dbeafe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8'
            }
          }
        }
      }
    };
  </script>
  <style>
    [x-cloak] { display: none !important; }
    html, body { height: 100%; }
    body { -webkit-tap-highlight-color: transparent; }
    .safe-pb { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
    .safe-bottom { bottom: env(safe-area-inset-bottom); }
    .fade-in { animation: fadeIn .18s ease-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="mx-auto min-h-screen max-w-md bg-slate-50 shadow-soft">
    <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/90 backdrop-blur">
      <div class="flex items-center gap-3 px-4 pb-3 pt-4">
        <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-brand-600 text-lg font-bold text-white" id="avatarLetter">?</div>
        <div class="min-w-0 flex-1">
          <p class="truncate text-xs font-medium text-slate-500" id="userEmail">Loading...</p>
          <h1 class="text-base font-bold text-slate-900" id="pageTitle">Dashboard</h1>
        </div>
        <div id="topbarActions" class="flex items-center gap-2"></div>
      </div>
    </header>

    <main class="safe-pb px-4 pb-24 pt-4">
      <section id="page-dashboard" class="page space-y-4">
        <div id="statGrid" class="grid grid-cols-2 gap-3">
          <div class="col-span-2 rounded-3xl border border-slate-200 bg-white p-4 text-sm text-slate-500 shadow-soft">Memuat...</div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-slate-900">Reminder Followup Hari Ini</h2>
            <span id="reminderCountChip" class="hidden rounded-full bg-red-100 px-2.5 py-1 text-[11px] font-semibold text-red-700"></span>
          </div>
          <div id="reminderList" class="space-y-3 text-sm text-slate-500">Memuat...</div>
        </div>

        <div class="rounded-3xl border border-red-200 bg-white p-4 shadow-soft">
          <div class="mb-3 flex items-center justify-between">
            <h2 class="text-sm font-semibold text-red-700">Calon Overdue</h2>
            <span id="overdueCountChip" class="rounded-full bg-red-100 px-2.5 py-1 text-[11px] font-semibold text-red-700">0</span>
          </div>
          <div id="overdueList" class="space-y-3 text-sm text-slate-500">Memuat...</div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <h2 class="mb-3 text-sm font-semibold text-slate-900">Pipeline Status</h2>
          <div id="pipelineChart" class="space-y-3"></div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <h2 class="mb-3 text-sm font-semibold text-slate-900">Minat Jurusan</h2>
          <div id="jurusanChart" class="space-y-3"></div>
        </div>

        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <h2 class="mb-3 text-sm font-semibold text-slate-900">Performa Tim SPMB</h2>
          <div id="picChart" class="space-y-3"></div>
        </div>
      </section>

      <section id="page-calon" class="page hidden space-y-4">
        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <div class="space-y-3">
            <input id="searchCalon" type="text" placeholder="Cari nama, WA, sekolah..." oninput="filterCalon()" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
            <div class="grid grid-cols-1 gap-3">
              <select id="filterStatus" onchange="filterCalon()" class="rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">Semua Status</option></select>
              <select id="filterJurusan" onchange="filterCalon()" class="rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">Semua Jurusan</option></select>
              <select id="filterPic" onchange="filterCalon()" class="rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">Semua PIC</option></select>
            </div>
            <button class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700" onclick="filterCalon()">Refresh Filter</button>
          </div>
        </div>
        <div id="calonCount" class="px-1 text-xs font-medium text-slate-500"></div>
        <div id="calonList" class="space-y-3"></div>
      </section>

      <section id="page-followup" class="page hidden space-y-4">
        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <h2 class="mb-3 text-sm font-semibold text-slate-900">Cari Calon untuk Log Followup</h2>
          <input id="searchFU" type="text" placeholder="Cari nama atau nomor WA..." oninput="searchForFU()" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          <div id="fuCalonList" class="mt-4 space-y-3"></div>
        </div>
        <div id="fuDetailCard" class="hidden rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <div id="fuDetailContent"></div>
        </div>
      </section>

      <section id="page-template" class="page hidden space-y-4">
        <div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">
          <h2 class="mb-3 text-sm font-semibold text-slate-900">Template Pesan WhatsApp</h2>
          <div id="templateList" class="space-y-3"></div>
        </div>
      </section>
    </main>

    <nav class="fixed bottom-0 left-1/2 z-30 flex w-full max-w-md -translate-x-1/2 border-t border-slate-200 bg-white/95 px-2 pb-[calc(0.5rem+env(safe-area-inset-bottom))] pt-2 backdrop-blur">
      <button class="nav-item-mobile flex flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-brand-600" data-page="dashboard">
        <span class="text-lg">🏠</span>
        <span class="text-[11px] font-semibold">Home</span>
      </button>
      <button class="nav-item-mobile flex flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-slate-500" data-page="calon">
        <span class="text-lg">👥</span>
        <span class="text-[11px] font-semibold">Calon</span>
      </button>
      <button class="nav-item-mobile flex flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-slate-500" data-page="followup">
        <span class="text-lg">💬</span>
        <span class="text-[11px] font-semibold">Followup</span>
      </button>
      <button class="nav-item-mobile flex flex-1 flex-col items-center gap-1 rounded-2xl px-2 py-2 text-slate-500" data-page="template">
        <span class="text-lg">📄</span>
        <span class="text-[11px] font-semibold">Template</span>
      </button>
    </nav>
  </div>

  <div class="modal-overlay fixed inset-0 z-40 hidden bg-slate-950/40 backdrop-blur-sm" id="modalTambahCalon">
    <div class="fade-in fixed inset-x-0 bottom-0 max-h-[92vh] overflow-hidden rounded-t-[2rem] bg-white">
      <div class="sticky top-0 z-10 flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4">
        <h3 class="text-base font-bold text-slate-900">Tambah Calon Baru</h3>
        <button class="rounded-full p-2 text-slate-500" onclick="closeModal('modalTambahCalon')">✕</button>
      </div>
      <div class="max-h-[calc(92vh-132px)] overflow-y-auto px-4 py-4">
        <div class="space-y-4">
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Nama Lengkap *</label>
            <input id="f_nama" type="text" placeholder="Nama lengkap calon" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">No WhatsApp *</label>
            <input id="f_noWa" type="text" placeholder="08xxxxxxxxxx" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Asal Sekolah *</label>
            <input id="f_asalSekolah" type="text" placeholder="SMP / MTs asal" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Jurusan Minat *</label>
            <select id="f_jurusan" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Pilih --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Sumber Info</label>
            <select id="f_sumber" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Pilih --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">PIC *</label>
            <select id="f_pic" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Pilih --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Prioritas</label>
            <select id="f_prioritas" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Pilih --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Jadwal Followup Pertama</label>
            <input id="f_jadwal" type="date" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Catatan</label>
            <textarea id="f_catatan" rows="4" placeholder="Catatan awal..." class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"></textarea>
          </div>
        </div>
      </div>
      <div class="sticky bottom-0 border-t border-slate-200 bg-white px-4 py-4">
        <div class="flex gap-3">
          <button class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700" onclick="closeModal('modalTambahCalon')">Batal</button>
          <button class="btn-submit-tambah flex-1 rounded-2xl bg-brand-600 px-4 py-3 text-sm font-semibold text-white" onclick="submitTambahCalon()">Simpan</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay fixed inset-0 z-40 hidden bg-slate-950/40 backdrop-blur-sm" id="modalLogFU">
    <div class="fade-in fixed inset-x-0 bottom-0 max-h-[92vh] overflow-hidden rounded-t-[2rem] bg-white">
      <div class="sticky top-0 z-10 flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4">
        <h3 class="text-base font-bold text-slate-900">Log Followup WhatsApp</h3>
        <button class="rounded-full p-2 text-slate-500" onclick="closeModal('modalLogFU')">✕</button>
      </div>
      <div class="max-h-[calc(92vh-132px)] overflow-y-auto px-4 py-4">
        <div id="fuCalonInfo" class="mb-4 rounded-2xl bg-slate-100 p-3 text-sm text-slate-700"></div>
        <div class="space-y-4">
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Arah Percakapan *</label>
            <select id="fu_arah" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Pilih --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">PIC *</label>
            <select id="fu_pic" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Pilih --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Isi Percakapan *</label>
            <textarea id="fu_isi" rows="6" placeholder="Paste percakapan di sini..." class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"></textarea>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Hasil / Kesimpulan</label>
            <textarea id="fu_hasil" rows="3" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"></textarea>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Next Action</label>
            <input id="fu_nextAction" type="text" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Update Status</label>
            <select id="fu_status" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm"><option value="">-- Tidak diubah --</option></select>
          </div>
          <div>
            <label class="mb-1.5 block text-xs font-semibold text-slate-600">Jadwal Followup Berikutnya</label>
            <input id="fu_jadwal" type="date" class="w-full rounded-2xl border-slate-200 bg-slate-50 text-sm" />
          </div>
        </div>
      </div>
      <div class="sticky bottom-0 border-t border-slate-200 bg-white px-4 py-4">
        <div class="flex gap-3">
          <button class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700" onclick="closeModal('modalLogFU')">Batal</button>
          <button class="btn-submit-log flex-1 rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white" onclick="submitLogFU()">Simpan Log</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay fixed inset-0 z-40 hidden bg-slate-950/40 backdrop-blur-sm" id="modalDetail">
    <div class="fade-in fixed inset-x-0 bottom-0 max-h-[94vh] overflow-hidden rounded-t-[2rem] bg-white">
      <div class="sticky top-0 z-10 flex items-center justify-between border-b border-slate-200 bg-white px-4 py-4">
        <h3 class="text-base font-bold text-slate-900">Detail Calon</h3>
        <button class="rounded-full p-2 text-slate-500" onclick="closeModal('modalDetail')">✕</button>
      </div>
      <div id="modalDetailBody" class="max-h-[calc(94vh-132px)] overflow-y-auto px-4 py-4 text-sm text-slate-600">Memuat...</div>
      <div class="sticky bottom-0 border-t border-slate-200 bg-white px-4 py-4">
        <div class="flex gap-3">
          <button class="flex-1 rounded-2xl bg-emerald-600 px-4 py-3 text-sm font-semibold text-white" onclick="openLogFUFromDetail()">+ Log FU</button>
          <button class="flex-1 rounded-2xl border border-slate-200 px-4 py-3 text-sm font-semibold text-slate-700" onclick="closeModal('modalDetail')">Tutup</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="pointer-events-none fixed left-1/2 top-4 z-50 hidden w-[calc(100%-2rem)] max-w-sm -translate-x-1/2 rounded-2xl bg-slate-900 px-4 py-3 text-sm font-medium text-white shadow-lg"></div>

  <script>
    let CFG = {};
    let allCalon = [];
    let filteredCalon = [];
    let fuSearchResults = [];
    let selectedCalon = null;
    let templateData = [];
    let reminderData = [];

    window.onload = () => {
      google.script.run
        .withSuccessHandler(function(cfg) {
          CFG = cfg;
          applyUser(cfg.user);
          populateDropdowns(cfg);
          bindBottomNav();
          switchPage('dashboard');
          loadDashboard();
          loadCalon();
          loadTemplates();
        })
        .withFailureHandler(function(err) {
          document.getElementById('statGrid').innerHTML = '<div class="col-span-2 rounded-3xl border border-red-200 bg-red-50 p-4 text-sm text-red-700">getConfig gagal: ' + err.message + '</div>';
        })
        .getConfig();
    };

    function bindBottomNav() {
      document.querySelectorAll('.nav-item-mobile').forEach(function(el) {
        el.addEventListener('click', function() {
          switchPage(el.dataset.page);
        });
      });
    }

    function switchPage(page) {
      document.querySelectorAll('.page').forEach(function(x) { x.classList.add('hidden'); });
      document.getElementById('page-' + page).classList.remove('hidden');
      document.querySelectorAll('.nav-item-mobile').forEach(function(x) {
        var active = x.dataset.page === page;
        x.classList.toggle('text-brand-600', active);
        x.classList.toggle('bg-brand-50', active);
        x.classList.toggle('text-slate-500', !active);
      });
      const titles = { dashboard: 'Dashboard', calon: 'Data Calon', followup: 'Followup WA', template: 'Template WA' };
      document.getElementById('pageTitle').textContent = titles[page] || 'CRM SPMB';
      updateTopbarActions(page);
      if (page === 'template') loadTemplates();
    }

    function applyUser(user) {
      document.getElementById('userEmail').textContent = user.email || '';
      document.getElementById('avatarLetter').textContent = (user.name || '?').charAt(0).toUpperCase();
    }

    function populateDropdowns(cfg) {
      fillSelect('f_jurusan', cfg.jurusans);
      fillSelect('f_sumber', cfg.sumbers);
      fillSelect('f_pic', cfg.pics);
      fillSelect('f_prioritas', cfg.prioritas);
      fillSelect('fu_pic', cfg.pics);
      fillSelect('fu_arah', cfg.arahs);
      fillSelect('fu_status', cfg.statuses, true);
      fillSelect('filterStatus', cfg.statuses, true);
      fillSelect('filterJurusan', cfg.jurusans, true);
      fillSelect('filterPic', cfg.pics, true);

      var picMatch = cfg.pics.find(function(p) {
        return p.toLowerCase().includes((CFG.user.name || '').toLowerCase());
      });
      if (picMatch) {
        document.getElementById('f_pic').value = picMatch;
        document.getElementById('fu_pic').value = picMatch;
      }
    }

    function fillSelect(id, items, keepFirst) {
      var sel = document.getElementById(id);
      if (!sel) return;
      var startIdx = keepFirst ? 1 : 0;
      while (sel.options.length > startIdx) sel.remove(startIdx);
      (items || []).forEach(function(v) {
        var o = document.createElement('option');
        o.value = o.text = v;
        sel.add(o);
      });
    }

    function updateTopbarActions(page) {
      var el = document.getElementById('topbarActions');
      if (page === 'dashboard') {
        el.innerHTML = '<button class="rounded-2xl border border-slate-200 px-3 py-2 text-xs font-semibold text-slate-700" onclick="loadDashboard()">Refresh</button>';
      } else if (page === 'calon') {
        el.innerHTML = '<button class="rounded-2xl bg-brand-600 px-3 py-2 text-xs font-semibold text-white" onclick="openModal(\'modalTambahCalon\')">Tambah</button>';
      } else {
        el.innerHTML = '';
      }
    }

    function getStatusClass(status) {
      var map = {
        'Baru': 'bg-blue-100 text-blue-700',
        'Dihubungi': 'bg-amber-100 text-amber-700',
        'Tertarik': 'bg-emerald-100 text-emerald-700',
        'Proses Daftar': 'bg-purple-100 text-purple-700',
        'Sudah Daftar': 'bg-cyan-100 text-cyan-700',
        'Tidak Jadi': 'bg-rose-100 text-rose-700'
      };
      return map[status] || 'bg-slate-100 text-slate-700';
    }

    function getPriorityClass(priority) {
      var map = {
        'Tinggi': 'bg-rose-100 text-rose-700',
        'Sedang': 'bg-amber-100 text-amber-700',
        'Rendah': 'bg-emerald-100 text-emerald-700'
      };
      return map[priority] || 'bg-slate-100 text-slate-700';
    }

    function getDirectionClass(direction) {
      return direction === 'Inbound' ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700';
    }

    function miniBar(label, value, pct, colorClass) {
      return '<div class="space-y-1.5">' +
        '<div class="flex items-center justify-between text-xs"><span class="font-medium text-slate-600">' + label + '</span><span class="font-semibold text-slate-900">' + value + (pct !== null ? ' (' + pct + '%)' : '') + '</span></div>' +
        '<div class="h-2 overflow-hidden rounded-full bg-slate-100"><div class="h-full rounded-full ' + colorClass + '" style="width:' + Math.max(4, pct || 0) + '%"></div></div>' +
      '</div>';
    }

    function loadDashboard() {
      document.getElementById('statGrid').innerHTML = '<div class="col-span-2 rounded-3xl border border-slate-200 bg-white p-4 text-sm text-slate-500 shadow-soft">Memuat dashboard...</div>';
      google.script.run
        .withSuccessHandler(renderDashboard)
        .withFailureHandler(function(e) {
          document.getElementById('statGrid').innerHTML = '<div class="col-span-2 rounded-3xl border border-red-200 bg-red-50 p-4 text-sm text-red-700">Server error: ' + e.message + '</div>';
        })
        .getDashboardStats();
    }

    function renderDashboard(stats) {
      var total = stats.total || 0;
      var sudahDaftar = stats.sudahDaftar || 0;
      var tidakJadi = stats.tidakJadi || 0;
      var aktif = total - sudahDaftar - tidakJadi;
      var konversi = total ? Math.round((sudahDaftar / total) * 100) : 0;
      var overdue = (stats.overdueCalon || []).length;

      document.getElementById('statGrid').innerHTML = [
        statCard('Total Calon', total, 'Terdaftar di sistem', 'bg-blue-50 text-blue-700'),
        statCard('Sudah Daftar', sudahDaftar, konversi + '% konversi', 'bg-emerald-50 text-emerald-700'),
        statCard('Aktif Diproses', aktif, 'Masih dalam pipeline', 'bg-amber-50 text-amber-700'),
        statCard('Followup Hari Ini', (stats.reminderHariIni || []).length, 'Perlu dihubungi', 'bg-rose-50 text-rose-700'),
        '<div class="col-span-2 rounded-3xl border border-red-200 bg-red-50 p-4 shadow-soft"><div class="text-xs font-semibold uppercase tracking-wide text-red-700">Overdue</div><div class="mt-1 text-3xl font-bold text-red-700">' + overdue + '</div><div class="mt-1 text-xs text-red-600">Jadwal followup sudah terlewat</div></div>'
      ].join('');

      reminderData = stats.reminderHariIni || [];
      var rChip = document.getElementById('reminderCountChip');
      if (reminderData.length > 0) {
        rChip.textContent = reminderData.length + ' item';
        rChip.classList.remove('hidden');
      } else {
        rChip.classList.add('hidden');
      }

      var rl = document.getElementById('reminderList');
      if (reminderData.length === 0) {
        rl.innerHTML = '<div class="rounded-2xl bg-emerald-50 p-3 text-sm text-emerald-700">Tidak ada jadwal followup hari ini.</div>';
      } else {
        rl.innerHTML = reminderData.map(function(c, i) {
          return personCard(c, i, true);
        }).join('');
      }

      var overdueData = stats.overdueCalon || [];
      document.getElementById('overdueCountChip').textContent = overdueData.length + ' item';
      var ol = document.getElementById('overdueList');
      if (overdueData.length === 0) {
        ol.innerHTML = '<div class="rounded-2xl bg-emerald-50 p-3 text-sm text-emerald-700">Tidak ada calon overdue.</div>';
      } else {
        ol.innerHTML = overdueData.map(function(c) {
          return '<div class="rounded-2xl border border-red-200 bg-red-50 p-3">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div class="min-w-0 flex-1">' +
                '<div class="truncate font-semibold text-slate-900">' + c.nama + '</div>' +
                '<div class="mt-1 text-xs text-slate-500">' + (c.asalSekolah || '-') + ' · ' + c.jurusan + '</div>' +
                '<div class="mt-2 flex flex-wrap gap-2">' +
                  badge(c.status, getStatusClass(c.status)) + badge(c.pic || '-', 'bg-white text-slate-700 border border-red-200') +
                '</div>' +
                '<div class="mt-2 text-xs font-semibold text-red-700">Jadwal: ' + (c.jadwalFollowup || '-') + '</div>' +
              '</div>' +
            '</div>' +
            '<div class="mt-3 flex gap-2">' +
              actionBtn('WA', 'bg-emerald-600 text-white', 'waLink(\'' + c.noWa + '\')') +
            '</div>' +
          '</div>';
        }).join('');
      }

      var statusColors = {
        'Baru': 'bg-blue-500',
        'Dihubungi': 'bg-amber-500',
        'Tertarik': 'bg-emerald-500',
        'Proses Daftar': 'bg-purple-500',
        'Sudah Daftar': 'bg-cyan-500',
        'Tidak Jadi': 'bg-rose-500'
      };
      document.getElementById('pipelineChart').innerHTML = Object.keys(stats.byStatus || {}).map(function(s) {
        var n = stats.byStatus[s];
        var pct = total ? Math.round((n / total) * 100) : 0;
        return miniBar(s, n, pct, statusColors[s] || 'bg-slate-400');
      }).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';

      document.getElementById('jurusanChart').innerHTML = Object.keys(stats.byJurusan || {}).map(function(j) {
        var n = stats.byJurusan[j];
        var pct = total ? Math.round((n / total) * 100) : 0;
        return miniBar(j, n, pct, 'bg-brand-600');
      }).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';

      document.getElementById('picChart').innerHTML = Object.keys(stats.byPic || {}).map(function(p) {
        return '<div class="flex items-center justify-between rounded-2xl bg-slate-50 px-3 py-3"><div class="text-sm font-medium text-slate-700">' + p + '</div><div class="rounded-full bg-slate-900 px-2.5 py-1 text-xs font-semibold text-white">' + stats.byPic[p] + '</div></div>';
      }).join('') || '<div class="text-sm text-slate-500">Belum ada data</div>';
    }

    function statCard(label, value, sub, colors) {
      return '<div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">' +
        '<div class="inline-flex rounded-full px-2.5 py-1 text-[11px] font-semibold ' + colors + '">' + label + '</div>' +
        '<div class="mt-3 text-3xl font-bold text-slate-900">' + value + '</div>' +
        '<div class="mt-1 text-xs text-slate-500">' + sub + '</div>' +
      '</div>';
    }

    function badge(text, cls) {
      return '<span class="inline-flex items-center rounded-full px-2.5 py-1 text-[11px] font-semibold ' + cls + '">' + text + '</span>';
    }

    function actionBtn(text, cls, onclick) {
      return '<button class="flex-1 rounded-2xl px-3 py-2.5 text-xs font-semibold ' + cls + '" onclick="' + onclick + '">' + text + '</button>';
    }

    function personCard(c, i, fromReminder) {
      var statusClass = getStatusClass(c.status);
      var priorityClass = getPriorityClass(c.prioritas);
      return '<div class="rounded-2xl border border-slate-200 bg-slate-50 p-3">' +
        '<div class="flex items-start gap-3">' +
          '<div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-brand-100 font-bold text-brand-700">' + (c.nama || '?').charAt(0).toUpperCase() + '</div>' +
          '<div class="min-w-0 flex-1">' +
            '<div class="truncate text-sm font-semibold text-slate-900">' + c.nama + '</div>' +
            '<div class="mt-1 text-xs text-slate-500">' + c.jurusan + ' · ' + (c.pic || '-') + '</div>' +
            '<div class="mt-2 flex flex-wrap gap-2">' +
              badge(c.status || '-', statusClass) + badge(c.prioritas || '-', priorityClass) +
            '</div>' +
            (c.jadwalFollowup ? '<div class="mt-2 text-xs font-medium text-slate-600">FU: ' + c.jadwalFollowup + '</div>' : '') +
          '</div>' +
        '</div>' +
        '<div class="mt-3 flex gap-2">' +
          actionBtn('WA', 'bg-emerald-600 text-white', 'waLink(\'' + c.noWa + '\')') +
          actionBtn('Detail', 'border border-slate-200 bg-white text-slate-700', fromReminder ? 'openDetailFromReminder(' + i + ')' : 'openDetail(filteredCalon[' + i + '])') +
        '</div>' +
      '</div>';
    }

    function loadCalon() {
      document.getElementById('calonList').innerHTML = '<div class="rounded-3xl border border-slate-200 bg-white p-4 text-sm text-slate-500 shadow-soft">Memuat data calon...</div>';
      google.script.run
        .withSuccessHandler(function(data) { allCalon = data; renderTabelCalon(data); })
        .withFailureHandler(function(e) { showToast('❌ ' + e.message); })
        .getDataCalon({});
    }

    function filterCalon() {
      var search = document.getElementById('searchCalon').value.toLowerCase();
      var status = document.getElementById('filterStatus').value;
      var jurusan = document.getElementById('filterJurusan').value;
      var pic = document.getElementById('filterPic').value;

      var data = allCalon.filter(function(r) {
        if (search && !r.nama.toLowerCase().includes(search) && !r.noWa.includes(search) && !r.asalSekolah.toLowerCase().includes(search)) return false;
        if (status && r.status !== status) return false;
        if (jurusan && r.jurusan !== jurusan) return false;
        if (pic && r.pic !== pic) return false;
        return true;
      });
      renderTabelCalon(data);
    }

    function renderTabelCalon(data) {
      filteredCalon = data;
      document.getElementById('calonCount').textContent = 'Menampilkan ' + data.length + ' data';
      if (data.length === 0) {
        document.getElementById('calonList').innerHTML = '<div class="rounded-3xl border border-slate-200 bg-white p-4 text-sm text-slate-500 shadow-soft">Tidak ada data ditemukan</div>';
        return;
      }

      var today = new Date(); today.setHours(0,0,0,0);
      document.getElementById('calonList').innerHTML = data.map(function(r, i) {
        var noWa = String(r.noWa || '');
        var terminalStatus = (r.status === 'Sudah Daftar' || r.status === 'Tidak Jadi');
        var isOverdue = false;
        if (r.jadwalFollowup && !terminalStatus) {
          var parts = r.jadwalFollowup.split('/');
          if (parts.length === 3) {
            var jadwalDate = new Date(parts[2], parts[1] - 1, parts[0]);
            jadwalDate.setHours(0,0,0,0);
            if (jadwalDate < today) isOverdue = true;
          }
        }
        return '<div class="rounded-3xl border ' + (isOverdue ? 'border-red-200 bg-red-50' : 'border-slate-200 bg-white') + ' p-4 shadow-soft">' +
          '<div class="flex items-start justify-between gap-3">' +
            '<div class="min-w-0 flex-1">' +
              '<div class="truncate text-base font-semibold text-slate-900">' + r.nama + '</div>' +
              '<div class="mt-1 text-xs text-slate-500">' + r.asalSekolah + ' · ' + r.noWa + '</div>' +
              '<div class="mt-3 flex flex-wrap gap-2">' +
                badge(r.status || '-', getStatusClass(r.status)) +
                badge(r.prioritas || '-', getPriorityClass(r.prioritas)) +
                badge(r.pic || '-', 'bg-slate-100 text-slate-700') +
              '</div>' +
            '</div>' +
            '<div class="rounded-2xl bg-slate-100 px-3 py-2 text-right text-[11px] text-slate-600">' +
              '<div>ID</div><div class="font-semibold text-slate-900">' + r.id + '</div>' +
            '</div>' +
          '</div>' +
          '<div class="mt-3 grid grid-cols-2 gap-2 text-xs">' +
            '<div class="rounded-2xl bg-slate-50 px-3 py-2"><div class="text-slate-500">Jurusan</div><div class="font-semibold text-slate-800">' + r.jurusan + '</div></div>' +
            '<div class="rounded-2xl ' + (isOverdue ? 'bg-red-100' : 'bg-slate-50') + ' px-3 py-2"><div class="text-slate-500">Jadwal FU</div><div class="font-semibold ' + (isOverdue ? 'text-red-700' : 'text-slate-800') + '">' + (r.jadwalFollowup || '-') + '</div></div>' +
            '<div class="rounded-2xl bg-slate-50 px-3 py-2"><div class="text-slate-500">Jumlah FU</div><div class="font-semibold text-slate-800">' + r.jumlahFollowup + '</div></div>' +
            '<div class="rounded-2xl bg-slate-50 px-3 py-2"><div class="text-slate-500">PIC</div><div class="font-semibold text-slate-800">' + (r.pic || '-') + '</div></div>' +
          '</div>' +
          '<div class="mt-4 grid grid-cols-4 gap-2">' +
            '<button class="rounded-2xl bg-emerald-600 px-3 py-2.5 text-xs font-semibold text-white" onclick="waLink(\'' + noWa + '\')">WA</button>' +
            '<button class="rounded-2xl border border-slate-200 bg-white px-3 py-2.5 text-xs font-semibold text-slate-700" onclick="openDetail(filteredCalon[' + i + '])">Detail</button>' +
            '<button class="rounded-2xl bg-brand-600 px-3 py-2.5 text-xs font-semibold text-white" onclick="openLogFU(filteredCalon[' + i + '])">Log</button>' +
            '<button class="rounded-2xl bg-rose-600 px-3 py-2.5 text-xs font-semibold text-white" onclick="confirmDeleteCalon(filteredCalon[' + i + '])">Hapus</button>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function confirmDeleteCalon(calon) {
      if (!confirm('Hapus data calon "' + calon.nama + '" (' + calon.id + ')?')) return;
      google.script.run
        .withSuccessHandler(function() {
          showToast('🗑 Data ' + calon.nama + ' berhasil dihapus.');
          loadCalon();
          loadDashboard();
        })
        .withFailureHandler(function(e) { showToast('❌ Gagal hapus: ' + e.message); })
        .deleteCalon(calon.id);
    }

    function submitTambahCalon() {
      var nama = document.getElementById('f_nama').value.trim();
      var noWa = document.getElementById('f_noWa').value.trim();
      var asalSekolah = document.getElementById('f_asalSekolah').value.trim();
      var jurusan = document.getElementById('f_jurusan').value;
      var pic = document.getElementById('f_pic').value;
      if (!nama || !noWa || !asalSekolah || !jurusan || !pic) {
        showToast('⚠️ Lengkapi field wajib');
        return;
      }

      var data = {
        nama: nama,
        noWa: noWa,
        asalSekolah: asalSekolah,
        jurusan: jurusan,
        sumber: document.getElementById('f_sumber').value,
        pic: pic,
        prioritas: document.getElementById('f_prioritas').value,
        jadwalFollowup: document.getElementById('f_jadwal').value,
        catatan: document.getElementById('f_catatan').value
      };

      var btn = document.querySelector('.btn-submit-tambah');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';

      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.textContent = 'Simpan';
          closeModal('modalTambahCalon');
          showToast('✅ Calon baru ditambahkan! ID: ' + res.id);
          loadCalon();
          loadDashboard();
          ['f_nama','f_noWa','f_asalSekolah','f_catatan','f_jadwal'].forEach(function(id) {
            document.getElementById(id).value = '';
          });
        })
        .withFailureHandler(function(e) {
          btn.disabled = false;
          btn.textContent = 'Simpan';
          showToast('❌ Gagal: ' + e.message);
        })
        .addCalon(data);
    }

    function openLogFU(calon) {
      selectedCalon = calon;
      document.getElementById('fuCalonInfo').innerHTML = '<div class="font-semibold text-slate-900">' + calon.nama + '</div><div class="mt-1 text-xs text-slate-500">' + calon.noWa + ' · ' + calon.jurusan + '</div><div class="mt-2 flex flex-wrap gap-2">' + badge(calon.status, getStatusClass(calon.status)) + badge('PIC: ' + calon.pic, 'bg-white text-slate-700') + '</div>';
      if (calon.pic) document.getElementById('fu_pic').value = calon.pic;
      ['fu_isi','fu_hasil','fu_nextAction','fu_jadwal'].forEach(function(id){ document.getElementById(id).value = ''; });
      document.getElementById('fu_status').value = '';
      openModal('modalLogFU');
    }

    function openLogFUFromDetail() {
      closeModal('modalDetail');
      if (selectedCalon) openLogFU(selectedCalon);
    }

    function submitLogFU() {
      var isi = document.getElementById('fu_isi').value.trim();
      var pic = document.getElementById('fu_pic').value;
      if (!isi || !pic) {
        showToast('⚠️ Isi percakapan dan PIC wajib diisi');
        return;
      }

      var data = {
        idCalon: selectedCalon.id,
        namaCalon: selectedCalon.nama,
        pic: pic,
        arah: document.getElementById('fu_arah').value,
        isiPercakapan: isi,
        hasil: document.getElementById('fu_hasil').value,
        nextAction: document.getElementById('fu_nextAction').value,
        statusBaru: document.getElementById('fu_status').value,
        jadwalBerikutnya: document.getElementById('fu_jadwal').value
      };

      var btn = document.querySelector('.btn-submit-log');
      btn.disabled = true;
      btn.textContent = 'Menyimpan...';
      google.script.run
        .withSuccessHandler(function(res) {
          btn.disabled = false;
          btn.textContent = 'Simpan Log';
          closeModal('modalLogFU');
          showToast('✅ Log disimpan! ID: ' + res.logId);
          loadCalon();
          loadDashboard();
        })
        .withFailureHandler(function(e) {
          btn.disabled = false;
          btn.textContent = 'Simpan Log';
          showToast('❌ Gagal: ' + e.message);
        })
        .addFollowUp(data);
    }

    function openDetail(calon) {
      selectedCalon = calon;
      document.getElementById('modalDetailBody').innerHTML = '<div class="rounded-2xl bg-slate-100 p-4 text-sm text-slate-500">Memuat riwayat...</div>';
      openModal('modalDetail');
      google.script.run
        .withSuccessHandler(function(logs) { renderDetail(calon, logs); })
        .withFailureHandler(function(e) { showToast('❌ ' + e.message); })
        .getFollowUpByCalon(calon.id);
    }

    function openDetailFromReminder(i) {
      var c = reminderData[i];
      if (!c) return;
      var calon = {
        id: c.id,
        nama: c.nama,
        noWa: c.noWa,
        asalSekolah: c.asalSekolah || '-',
        jurusan: c.jurusan,
        sumber: c.sumber || '-',
        tanggalMasuk: c.tanggalMasuk || '-',
        status: c.status,
        pic: c.pic,
        prioritas: c.prioritas || '-',
        jadwalFollowup: c.jadwalFollowup || '-',
        terakhirFollowup: c.terakhirFollowup || '-',
        jumlahFollowup: c.jumlahFollowup || 0,
        catatan: c.catatan || ''
      };
      selectedCalon = calon;
      document.getElementById('modalDetailBody').innerHTML = '<div class="rounded-2xl bg-slate-100 p-4 text-sm text-slate-500">Memuat riwayat...</div>';
      openModal('modalDetail');
      google.script.run
        .withSuccessHandler(function(logs) { renderDetail(calon, logs); })
        .withFailureHandler(function(e) { document.getElementById('modalDetailBody').innerHTML = '<div class="rounded-2xl bg-red-50 p-4 text-sm text-red-700">Gagal memuat: ' + e.message + '</div>'; })
        .getFollowUpByCalon(calon.id);
    }

    function renderDetail(c, logs) {
      var noWa62 = (c.noWa || '').replace(/^0/, '');
      var infoCard = function(lbl, val) {
        return '<div class="rounded-2xl bg-slate-50 px-3 py-3"><div class="text-[11px] font-medium uppercase tracking-wide text-slate-500">' + lbl + '</div><div class="mt-1 text-sm font-semibold text-slate-900">' + (val || '-') + '</div></div>';
      };
      var infoGrid = '<div class="grid grid-cols-2 gap-3">' +
        infoCard('No WA', c.noWa) +
        infoCard('Asal Sekolah', c.asalSekolah) +
        infoCard('Jurusan', c.jurusan) +
        infoCard('Sumber', c.sumber || '-') +
        infoCard('PIC', c.pic || '-') +
        infoCard('Prioritas', c.prioritas || '-') +
        infoCard('Tanggal Masuk', c.tanggalMasuk || '-') +
        infoCard('Jadwal FU', c.jadwalFollowup || '-') +
        infoCard('Terakhir FU', c.terakhirFollowup || '-') +
        infoCard('Jumlah FU', c.jumlahFollowup || 0) +
      '</div>';

      var logHtml = logs.length === 0 ? '<div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">Belum ada log followup.</div>' : logs.map(function(l) {

          '<div class="mb-2 flex flex-wrap items-center gap-2">' +
            badge(l.arah, getDirectionClass(l.arah)) +
            '<span class="text-[11px] text-slate-500">' + l.tanggal + '</span>' +
            '<span class="text-[11px] text-slate-500">' + l.pic + '</span>' +
          '</div>' +
          '<div class="rounded-2xl bg-white p-3 text-sm whitespace-pre-wrap text-slate-700">' + l.isiPercakapan + '</div>' +
          '<div class="mt-2 space-y-1 text-xs text-slate-600">' +
            (l.hasil ? '<div><b>Hasil:</b> ' + l.hasil + '</div>' : '') +
            (l.nextAction ? '<div><b>Next:</b> ' + l.nextAction + '</div>' : '') +
            (l.jadwalBerikutnya ? '<div><b>FU berikutnya:</b> ' + l.jadwalBerikutnya + '</div>' : '') +
          '</div>' +
        '</div>';
      }).join('');

      document.getElementById('modalDetailBody').innerHTML =
        '<div class="space-y-4">' +
          '<div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">' +
            '<div class="flex items-start justify-between gap-3">' +
              '<div class="min-w-0 flex-1">' +
                '<div class="text-lg font-bold text-slate-900">' + c.nama + '</div>' +
                '<div class="mt-1 text-xs text-slate-500">' + c.id + ' · ' + (c.jumlahFollowup || 0) + ' kali followup</div>' +
                '<div class="mt-3 flex flex-wrap gap-2">' + badge(c.status || '-', getStatusClass(c.status)) + '</div>' +
              '</div>' +
              '<a href="https://wa.me/62' + noWa62 + '" target="_blank" class="rounded-2xl bg-emerald-600 px-3 py-2 text-xs font-semibold text-white">Buka WA</a>' +
            '</div>' +
            (c.catatan ? '<div class="mt-4 rounded-2xl bg-amber-50 p-3 text-sm text-amber-800"><b>Catatan:</b> ' + c.catatan + '</div>' : '') +
          '</div>' +
          '<div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">' + infoGrid + '</div>' +
          '<div class="rounded-3xl border border-slate-200 bg-white p-4 shadow-soft">' +
            '<div class="mb-3 text-sm font-semibold text-slate-900">Riwayat Percakapan (' + logs.length + ')</div>' +
            '<div class="space-y-3">' + logHtml + '</div>' +
          '</div>' +
        '</div>';
    }

    function searchForFU() {
      var q = document.getElementById('searchFU').value.toLowerCase();
      fuSearchResults = q ? allCalon.filter(function(c) {
        return c.nama.toLowerCase().includes(q) || c.noWa.includes(q);
      }).slice(0, 8) : [];
      var el = document.getElementById('fuCalonList');
      if (!q) { el.innerHTML = ''; return; }
      if (fuSearchResults.length === 0) {
        el.innerHTML = '<div class="rounded-2xl bg-slate-50 p-3 text-sm text-slate-500">Tidak ditemukan</div>';
        return;
      }
      el.innerHTML = fuSearchResults.map(function(c, i) {
        return '<div class="rounded-2xl border border-slate-200 bg-slate-50 p-3">' +
          '<div class="flex items-start gap-3">' +
            '<div class="flex h-10 w-10 items-center justify-center rounded-2xl bg-brand-100 font-bold text-brand-700">' + c.nama.charAt(0) + '</div>' +
            '<div class="min-w-0 flex-1">' +
              '<div class="truncate text-sm font-semibold text-slate-900">' + c.nama + '</div>' +
              '<div class="mt-1 text-xs text-slate-500">' + c.noWa + ' · ' + c.jurusan + '</div>' +
              '<div class="mt-2">' + badge(c.status, getStatusClass(c.status)) + '</div>' +
            '</div>' +
          '</div>' +
          '<button class="mt-3 w-full rounded-2xl bg-emerald-600 px-3 py-2.5 text-xs font-semibold text-white" onclick="selectCalonFU(fuSearchResults[' + i + '])">+ Log Followup</button>' +
        '</div>';
      }).join('');
    }

    function selectCalonFU(calon) {
      selectedCalon = calon;
      document.getElementById('fuDetailCard').classList.remove('hidden');
      document.getElementById('fuDetailContent').innerHTML = '<div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">Memuat riwayat...</div>';
      google.script.run
        .withSuccessHandler(function(logs) {
          var logHtml = logs.length === 0 ? '<div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">Belum ada log.</div>' : logs.map(function(l) {
            return '<div class="rounded-2xl p-3 ' + (l.arah === 'Outbound' ? 'bg-blue-50' : 'bg-emerald-50') + '">' +
              '<div class="mb-2 flex flex-wrap items-center gap-2">' + badge(l.arah, getDirectionClass(l.arah)) + '<span class="text-[11px] text-slate-500">' + l.tanggal + '</span><span class="text-[11px] text-slate-500">' + l.pic + '</span></div>' +
              '<div class="rounded-2xl bg-white p-3 text-sm whitespace-pre-wrap text-slate-700">' + l.isiPercakapan + '</div>' +
              (l.hasil ? '<div class="mt-2 text-xs text-slate-600"><b>Hasil:</b> ' + l.hasil + '</div>' : '') +
            '</div>';
          }).join('');

          document.getElementById('fuDetailContent').innerHTML = '<div class="flex items-center justify-between gap-3"><div class="min-w-0 flex-1"><div class="truncate text-base font-bold text-slate-900">' + calon.nama + '</div><div class="mt-1 text-xs text-slate-500">' + calon.noWa + '</div><div class="mt-2">' + badge(calon.status, getStatusClass(calon.status)) + '</div></div><button class="rounded-2xl bg-emerald-600 px-3 py-2 text-xs font-semibold text-white" onclick="openLogFU(selectedCalon)">+ Tambah Log</button></div><div class="mt-4 space-y-3">' + logHtml + '</div>';
        })
        .withFailureHandler(function(e) { showToast('❌ ' + e.message); })
        .getFollowUpByCalon(calon.id);
    }

    function loadTemplates() {
      document.getElementById('templateList').innerHTML = '<div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">Memuat template...</div>';
      google.script.run
        .withSuccessHandler(function(data) {
          templateData = data;
          if (data.length === 0) {
            document.getElementById('templateList').innerHTML = '<div class="rounded-2xl bg-slate-50 p-4 text-sm text-slate-500">Belum ada template.</div>';
            return;
          }
          document.getElementById('templateList').innerHTML = data.map(function(t, i) {
            return '<div class="rounded-3xl border border-slate-200 bg-slate-50 p-4">' +
              '<div class="flex items-start justify-between gap-3">' +
                '<div class="min-w-0 flex-1"><div class="truncate text-sm font-bold text-slate-900">' + t.nama + '</div><div class="mt-1 inline-flex rounded-full bg-white px-2.5 py-1 text-[11px] font-medium text-slate-600">' + t.situasi + '</div></div>' +
                '<button class="rounded-2xl border border-slate-200 bg-white px-3 py-2 text-xs font-semibold text-slate-700" onclick="copyTemplate(' + i + ')">Salin</button>' +
              '</div>' +
              '<div class="mt-3 whitespace-pre-wrap rounded-2xl bg-white p-3 text-sm text-slate-700">' + t.isi + '</div>' +
            '</div>';
          }).join('');
        })
        .withFailureHandler(function(e) {
          document.getElementById('templateList').innerHTML = '<div class="rounded-2xl bg-red-50 p-4 text-sm text-red-700">Gagal memuat template: ' + e.message + '</div>';
        })
        .getTemplateWA();
    }

    function copyTemplate(i) {
      var teks = templateData[i].isi;
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(teks)
          .then(function() { showToast('✅ Template disalin ke clipboard!'); })
          .catch(function() { fallbackCopy(teks); });
      } else {
        fallbackCopy(teks);
      }
    }

    function fallbackCopy(teks) {
      var ta = document.createElement('textarea');
      ta.value = teks;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.focus(); ta.select();
      var ok = false;
      try { ok = document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      showToast(ok ? '✅ Template disalin ke clipboard!' : '⚠️ Salin manual: tekan Ctrl+C');
    }

    function openModal(id) {
      document.getElementById(id).classList.remove('hidden');
      document.body.classList.add('overflow-hidden');
    }

    function closeModal(id) {
      document.getElementById(id).classList.add('hidden');
      if ([...document.querySelectorAll('.modal-overlay')].every(function(el) { return el.classList.contains('hidden'); })) {
        document.body.classList.remove('overflow-hidden');
      }
    }

    function waLink(noWa) {
      window.open('https://wa.me/62' + String(noWa || '').replace(/^0/, ''), '_blank');
    }

    function showToast(msg, duration) {
      duration = duration || 2500;
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.remove('hidden');
      clearTimeout(t._timer);
      t._timer = setTimeout(function() { t.classList.add('hidden'); }, duration);
    }

    document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) closeModal(overlay.id);
      });
    });
  </script>
</body>
</html>
